# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Color Support & Fallback
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

set -g mouse on
set -g set-clipboard on

# 1 based indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -sg escape-time 0

set -g mode-keys vi
set -g status-keys vi

#################
#---- Binds ----#
#################

# Reloading Config
bind r if-shell "test -f ~/.tmux.conf" "source-file ~/.tmux.conf" "source-file ~/.config/tmux/tmux.conf" \; display-message "Configuration Reloaded"

# Panes
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind-key 1 if-shell "tmux select-window -t 1" "" "new-window -t 1"
bind-key 2 if-shell "tmux select-window -t 2" "" "new-window -t 2"
bind-key 3 if-shell "tmux select-window -t 3" "" "new-window -t 3"
bind-key 4 if-shell "tmux select-window -t 4" "" "new-window -t 4"
bind-key 5 if-shell "tmux select-window -t 5" "" "new-window -t 5"
bind-key 6 if-shell "tmux select-window -t 6" "" "new-window -t 6"
bind-key 7 if-shell "tmux select-window -t 7" "" "new-window -t 7"
bind-key 8 if-shell "tmux select-window -t 8" "" "new-window -t 8"
bind-key 9 if-shell "tmux select-window -t 9" "" "new-window -t 9"

bind -r h select-window -t :-
bind -r l select-window -t :+

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

bind C-k clear-history \; display-message "history cleared"
bind q kill-pane

##################################
# ---- Vim-Tmux Navigation ----- #
##################################
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

######################
# --- Status Bar --- #
######################
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=white"
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=white"
set -g status-right "#[fg=brightblack][ #[fg=white,bold]#{=30:pane_current_path} #[fg=brightblack]]"
set -g status-left-length 45
set -g status-left "#[fg=brightblack]| #[fg=white,bold]#{host_short}#[fg=brightblack] |  "
set -g status-right-length 40
set -w -g window-status-format "#[fg=brightblack] #I:#W /"
set -w -g window-status-current-format "#[fg=white,bold][ #I:#W ]"
set -g message-style "bg=black,fg=white"
set -g message-command-style "bg=black,fg=white"

# Additional Config
if-shell "[ -f ~/.config/tmux/plugins.tmux ]" "source ~/.config/tmux/plugins.tmux"
